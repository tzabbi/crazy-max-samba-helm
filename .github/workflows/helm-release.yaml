name: Lint, Release & Publish Helm Chart

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OCI_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts

concurrency:
  group: helm-release-main
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Helm Chart
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(release): bump chart version') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Lint Helm Chart
        run: helm lint .

  release:
    name: Release Helm Chart
    needs: lint
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(release): bump chart version') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump chart version
        id: bump
        shell: bash
        run: |
          chart_name=$(awk '/^name:/ { print $2; exit }' Chart.yaml)
          current_version=$(awk '/^version:/ { print $2; exit }' Chart.yaml)
          IFS='.' read -r major minor patch <<< "${current_version}"

          if [ -z "${major}" ] || [ -z "${minor}" ] || [ -z "${patch}" ]; then
            echo "Chart version '${current_version}' is not valid semantic versioning"
            exit 1
          fi

          new_version="${major}.${minor}.$((patch + 1))"
          sed -i "s/^version: .*/version: ${new_version}/" Chart.yaml

          echo "chart_name=${chart_name}" >> "$GITHUB_OUTPUT"
          echo "previous_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped chart version
        run: |
          git add Chart.yaml
          git commit -m "chore(release): bump chart version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:main

      - name: Package chart
        run: |
          mkdir -p dist
          helm package . --destination dist

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" --username "${{ github.actor }}" --password-stdin

      - name: Push chart to OCI registry
        run: |
          helm push "dist/${{ steps.bump.outputs.chart_name }}-${{ steps.bump.outputs.new_version }}.tgz" "${{ env.OCI_REPOSITORY }}"

      - name: Create Git tag
        run: |
          if git rev-parse "v${{ steps.bump.outputs.new_version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.bump.outputs.new_version }} already exists"
            exit 1
          fi

          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: Helm Chart Release ${{ steps.bump.outputs.new_version }}
          files: dist/*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true
